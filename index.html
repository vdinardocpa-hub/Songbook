<style>
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
  --border:#333;--accent:#c8a96e;--accent2:#4a7fa5;
  --text:#e8e4dc;--text2:#888;--text3:#555;
  --chord:#f0c040;--red:#c0392b;--green:#2ecc71;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;user-select:none;}
.screen{display:none;flex-direction:column;height:100dvh;width:100vw;position:absolute;top:0;left:0;}
.screen.active{display:flex;}

/* SETUP */
#setup{align-items:center;justify-content:center;gap:20px;padding:24px;background:var(--bg);}
.setup-logo{font-family:'Playfair Display',serif;font-size:56px;font-weight:900;color:var(--accent);text-align:center;line-height:1;}
.setup-tag{font-size:12px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;text-align:center;}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:500px;display:flex;flex-direction:column;gap:14px;}
.field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:5px;font-weight:700;}
.sinput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);font-family:'Playfair Display',serif;outline:none;}
.sinput:focus{border-color:var(--accent);}
.sinput::placeholder{color:var(--text3);font-style:italic;font-size:14px;}
.srow{display:flex;gap:10px;}
.sets-row{display:flex;gap:10px;}
.sets-btn{flex:1;padding:20px;border-radius:12px;border:2px solid var(--border);background:var(--surface2);color:var(--text2);font-size:32px;font-weight:900;cursor:pointer;font-family:'Playfair Display',serif;text-align:center;transition:all 0.15s;}
.sets-btn.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent);}
.start-btn{padding:15px;border-radius:12px;background:var(--accent);color:#0f0f0f;font-size:15px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;letter-spacing:1px;text-transform:uppercase;border:none;width:100%;}
.start-btn:active{opacity:0.8;}

/* GLOBAL HEADER */
.g-header{display:flex;align-items:center;padding:0 12px;height:50px;background:var(--surface);border-bottom:2px solid var(--accent);flex-shrink:0;gap:8px;}
.gh-band{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;color:var(--accent);border:none;background:none;outline:none;min-width:80px;max-width:180px;}
.gh-band::placeholder{color:var(--text3);font-style:italic;font-size:13px;}
.gh-sep{color:var(--border);flex-shrink:0;}
.gh-event{font-size:15px;color:var(--text);border:none;background:none;outline:none;flex:1;font-family:'Lato',sans-serif;}
.gh-event::placeholder{color:var(--text3);font-style:italic;}
.gh-date{font-size:12px;color:var(--text2);border:none;background:none;outline:none;width:65px;text-align:right;font-family:'Lato',sans-serif;}
.gh-new{background:none;border:1px solid var(--accent);border-radius:7px;color:var(--accent);font-size:11px;padding:5px 8px;cursor:pointer;font-family:'Lato',sans-serif;font-weight:700;white-space:nowrap;flex-shrink:0;}

/* COLS */
.cols{display:flex;flex:1;overflow:hidden;touch-action:pan-y;}
.set-col{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0;}
.set-h{padding:7px 8px 5px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.set-h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.set-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:700;}
.set-btns{display:flex;gap:4px;}
.shbtn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:9px;padding:3px 6px;cursor:pointer;font-family:'Lato',sans-serif;}
.shbtn.share{color:var(--accent);border-color:var(--accent);}
.shbtn.lock{color:var(--green);border-color:var(--green);}
.shbtn.lock.on{background:var(--green);color:#0f0f0f;}
.shbtn.clear{color:var(--red);border-color:var(--red);}
.prog-row{display:flex;align-items:center;gap:5px;}
.prog-label{font-size:11px;color:var(--text3);white-space:nowrap;min-width:36px;}
.prog-label.full{color:var(--red);font-weight:700;}
.prog-track{flex:1;height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.2s;}
.prog-fill.full{background:var(--red);}
.set-songs{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;height:0;min-height:0;}
.song-row{display:flex;align-items:center;gap:5px;padding:8px 7px;min-height:52px;border-bottom:1px solid rgba(255,255,255,0.04);position:relative;overflow:hidden;}
.song-row.drag-top{box-shadow:inset 0 2px 0 var(--accent);}
.song-row.drag-bot{box-shadow:inset 0 -2px 0 var(--accent);}
.row-num{font-size:13px;color:var(--accent);width:18px;text-align:center;flex-shrink:0;font-weight:700;}
.row-handle{font-size:13px;color:var(--text3);flex-shrink:0;cursor:grab;padding:2px;touch-action:none;}
.row-info{flex:1;min-width:0;cursor:pointer;}
.row-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-meta{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.swipe-actions{position:absolute;right:0;top:0;bottom:0;display:flex;align-items:stretch;transform:translateX(100%);transition:transform 0.25s;}
.swipe-actions.open{transform:translateX(0);}
.swipe-btn{display:flex;align-items:center;justify-content:center;padding:0 14px;font-size:11px;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;border:none;white-space:nowrap;}
.swipe-replace{background:#2471a3;color:white;}
.swipe-remove{background:var(--red);color:white;}
.drop-zone{min-height:24px;flex-shrink:0;border:2px dashed transparent;border-radius:6px;margin:3px;transition:all 0.15s;}
.drop-zone.active{border-color:var(--accent);background:rgba(200,169,110,0.06);}

/* LIB */
.lib-col{width:200px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);height:100%;transition:width 0.25s ease;}
.lib-col.collapsed{width:44px;}
.lib-col.collapsed .lib-search,
.lib-col.collapsed .lib-list{display:none;}
.lib-col.collapsed .lib-h-top{justify-content:center;}
.lib-col.collapsed .lib-count{display:none;}
.lib-toggle{background:none;border:none;color:var(--accent);font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0;}
.lib-h{padding:7px 8px 5px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.lib-search{padding:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.lib-input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;color:var(--text);font-family:'Lato',sans-serif;outline:none;}
.lib-input:focus{border-color:var(--accent);}
.lib-input::placeholder{color:var(--text3);}
.lib-list{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;height:0;min-height:0;}
.lib-row{display:flex;align-items:center;padding:9px 9px;border-bottom:1px solid rgba(255,255,255,0.04);gap:7px;cursor:grab;touch-action:none;}
.lib-row.in-set{opacity:0.3;cursor:default;}
.lib-info{flex:1;min-width:0;}
.lib-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lib-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.lib-add{width:22px;height:22px;border-radius:50%;background:var(--accent);border:none;color:#0f0f0f;font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-weight:700;line-height:1;}
.lib-add:active{opacity:0.7;}
.lib-add.in{background:var(--surface3);color:var(--text3);font-size:11px;cursor:default;}

/* SONG VIEW */
#song-view{background:var(--bg);}
.sv-nav{display:flex;align-items:center;padding:0 12px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
.sv-back{background:none;border:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;white-space:nowrap;}
.sv-pos{flex:1;text-align:center;font-size:11px;color:var(--text2);}
.sv-font{display:flex;gap:5px;}
.sv-fbtn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 9px;cursor:pointer;font-family:'Lato',sans-serif;font-weight:700;font-size:12px;}
.sv-nav-btns{display:flex;gap:6px;}
.sv-nbtn{background:none;border:none;color:var(--accent);font-size:20px;cursor:pointer;padding:2px 6px;}
.sv-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.sv-tab{flex:1;height:42px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;}
.sv-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sv-content{flex:1;overflow-y:scroll;padding:14px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.sv-header{margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--accent2);}
.sv-title{font-family:'Playfair Display',serif;font-weight:900;color:var(--text);line-height:1.1;}
.sv-artist{color:var(--text2);font-style:italic;margin:3px 0 7px;}
.sv-chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 9px;color:var(--text2);}
.chip span{color:var(--text);font-weight:700;}
.chip.capo{border-color:var(--red);}
.chip.capo span{color:var(--red);}
.roadmap{background:var(--surface);border-left:3px solid var(--accent2);padding:7px 10px;margin-bottom:12px;color:var(--text2);font-family:'Courier Prime',monospace;line-height:1.5;border-radius:0 6px 6px 0;}
.c-head{font-family:'Courier Prime',monospace;font-weight:700;color:var(--chord);margin:14px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--chord);}
.c-head:first-of-type{margin-top:0;}
.c-line{display:flex;align-items:baseline;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.c-chords{font-family:'Courier Prime',monospace;font-weight:700;color:var(--chord);flex-shrink:0;min-width:120px;}
.c-cue{color:#777;font-style:italic;flex:1;}
.o-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.o-head{font-weight:700;color:var(--accent);margin:10px 0 3px;padding-bottom:2px;border-bottom:1px solid var(--border);}
.o-head:first-child{margin-top:0;}
.o-chord{font-family:'Courier Prime',monospace;font-weight:700;color:var(--chord);padding:2px 0;}
.o-lyric{color:var(--text2);padding:1px 0 2px;line-height:1.4;}
.l-head{font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 5px;}
.l-head:first-child{margin-top:0;}
.l-line{font-family:'Playfair Display',serif;color:var(--text);line-height:1.65;}

/* REPLACE */
#replace-view{background:var(--bg);}
.rp-nav{display:flex;align-items:center;padding:0 14px;height:50px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;}
.rp-back{background:none;border:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;}
.rp-title-h{flex:1;text-align:center;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;}
.rp-hint{font-size:11px;color:var(--text2);text-align:center;padding:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.rp-search{padding:9px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.rp-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--text);font-family:'Lato',sans-serif;outline:none;}
.rp-list{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.rp-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);gap:10px;cursor:pointer;}
.rp-row:active{background:var(--surface2);}
.rp-row.same-key{border-left:3px solid var(--green);}
.rp-info{flex:1;min-width:0;}
.rp-title-text{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rp-meta{font-size:11px;color:var(--text2);margin-top:2px;}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.active{display:flex;}
.modal-sheet{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:22px;width:100%;max-width:560px;}
.modal-sheet h3{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:7px;}
.modal-sheet p{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.5;}
.modal-btns{display:flex;gap:8px;}
.mbtn{flex:1;padding:12px;border-radius:9px;border:none;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.mbtn.cancel{background:var(--surface2);color:var(--text);}
.mbtn.danger{background:var(--red);color:white;}
.mbtn.primary{background:var(--accent);color:#0f0f0f;}
.share-opts{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
.share-opt{padding:12px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Lato',sans-serif;font-size:14px;cursor:pointer;text-align:left;}
.share-opt:active{background:var(--surface3);}

#drag-ghost{position:fixed;pointer-events:none;z-index:999;background:var(--surface2);border:1px solid var(--accent);border-radius:7px;padding:5px 11px;font-size:12px;color:var(--text);font-family:'Playfair Display',serif;font-weight:700;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── PERFORMANCE MODE ── */
#perf-view{background:var(--bg);}
.perf-header{
  display:flex;align-items:center;padding:0 16px;height:56px;
  background:var(--surface);border-bottom:2px solid var(--accent);
  flex-shrink:0;gap:12px;
}
.perf-set-label{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:900;
  color:var(--accent);flex-shrink:0;
}
.perf-event-info{flex:1;text-align:center;font-size:12px;color:var(--text2);}
.perf-exit{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--text2);font-size:12px;padding:6px 12px;cursor:pointer;
  font-family:'Lato',sans-serif;font-weight:700;flex-shrink:0;
}
.perf-exit:active{background:var(--surface2);}
.perf-song-list{
  flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;
  height:0;min-height:0;padding:8px 0;
}
.perf-row{
  display:flex;align-items:center;padding:14px 20px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  cursor:pointer;gap:14px;min-height:60px;
  transition:background 0.1s;
}
.perf-row:active{background:var(--surface2);}
.perf-num{
  font-size:13px;color:var(--text3);width:24px;
  text-align:center;flex-shrink:0;font-weight:700;
}
.perf-info{flex:1;min-width:0;}
.perf-title{
  font-family:'Playfair Display',serif;font-size:20px;font-weight:700;
  color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.perf-meta{font-size:13px;color:var(--text2);margin-top:3px;}
.perf-arrow{color:var(--text3);font-size:22px;flex-shrink:0;}
.perf-footer{
  display:flex;align-items:center;padding:10px 16px;
  border-top:1px solid var(--border);background:var(--surface);
  flex-shrink:0;gap:8px;
}
.perf-nav-btn{
  flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Lato',sans-serif;text-align:center;
  transition:all 0.15s;
}
.perf-nav-btn.active{background:var(--accent);color:#0f0f0f;border-color:var(--accent);}
.perf-nav-btn:active{opacity:0.7;}
.perf-count{font-size:11px;color:var(--text3);text-align:center;padding:4px 0 0;}

/* ── PERFORMANCE SONG VIEW ── */
.perf-song-header{
  margin-bottom:16px;padding-bottom:14px;
  border-bottom:3px solid var(--accent);
}
.perf-song-title{
  font-family:'Playfair Display',serif;font-weight:900;
  color:var(--text);line-height:1.1;margin-bottom:6px;
}
.perf-song-sub{color:var(--text2);margin-bottom:8px;}
.perf-song-roadmap{
  background:var(--surface);border-left:3px solid var(--accent2);
  padding:8px 12px;border-radius:0 6px 6px 0;
  color:var(--text2);font-family:'Courier Prime',monospace;
  line-height:1.5;margin-top:8px;
}
/* Stacked chart items */
.ps-head{
  font-family:'Courier Prime',monospace;font-weight:700;
  color:var(--chord);margin:22px 0 8px;padding-bottom:4px;
  border-bottom:2px solid var(--chord);letter-spacing:0.5px;
}
.ps-head:first-of-type{margin-top:0;}
.ps-chords{
  font-family:'Courier Prime',monospace;font-weight:700;
  color:var(--chord);padding:6px 0 2px;
}
.ps-cue{
  color:#e8e4dc;padding:2px 0 10px;
  padding-left:12px;border-left:2px solid var(--border);
  margin-left:4px;line-height:1.5;
}
</style>
</head>
<body>

<div id="setup" class="screen active">
  <div class="setup-logo">&#9834;</div>
  <div class="setup-tag">Song Book</div>
  <div class="setup-card">
    <div class="field"><label>Band Name</label>
      <input class="sinput" id="s-band" placeholder="Your band name..." maxlength="40"></div>
    <div class="srow">
      <div class="field" style="flex:2"><label>Event / Location</label>
        <input class="sinput" id="s-event" placeholder="Celtic Corner..." maxlength="40"></div>
      <div class="field" style="flex:1"><label>Date</label>
        <input class="sinput" id="s-date" placeholder="3/14/26" maxlength="12"></div>
    </div>
    <div class="field"><label>Number of Sets Tonight</label>
      <div class="sets-row">
        <button class="sets-btn" id="sb1" onclick="pickSets(1)">1</button>
        <button class="sets-btn active" id="sb2" onclick="pickSets(2)">2</button>
        <button class="sets-btn" id="sb3" onclick="pickSets(3)">3</button>
      </div>
    </div>
    <button class="start-btn" onclick="startNight()">Start Tonight</button>
  </div>
</div>

<div id="main" class="screen">
  <div class="g-header">
    <input class="gh-band" id="gh-band" placeholder="Band..." maxlength="40" oninput="saveState()">
    <span class="gh-sep">|</span>
    <input class="gh-event" id="gh-event" placeholder="Event / Location..." maxlength="40" oninput="saveState()">
    <input class="gh-date" id="gh-date" placeholder="Date" maxlength="12" oninput="saveState()">
    <button class="gh-new" onclick="newNight()">New Night</button>
    <button class="gh-new" style="background:var(--accent);color:#0f0f0f;border-color:var(--accent);" onclick="enterPerformanceMode()">&#9654; Perform</button>
  </div>
  <div class="cols" id="cols-area"></div>
</div>

<div id="welcome-view" class="screen">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;gap:20px;">
    <div style="font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:var(--accent);">&#9834;</div>
    <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text);text-align:center;" id="wb-title">Welcome Back</div>
    <div style="font-size:13px;color:var(--text2);text-align:center;line-height:1.6;" id="wb-detail"></div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;width:100%;max-width:420px;" id="wb-sets"></div>
    <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:420px;">
      <button class="start-btn" onclick="continueSavedSession()">Continue Session &#8250;</button>
      <button class="start-btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);" onclick="startFreshFromWelcome()">Start New Night</button>
    </div>
    <div style="font-size:11px;color:var(--green);text-align:center;">&#10003; Your sets are saved</div>
  </div>
</div>

<div id="perf-view" class="screen">
  <div class="perf-header">
    <span class="perf-set-label" id="perf-set-label">Set 1</span>
    <span class="perf-event-info" id="perf-event"></span>
    <button class="perf-exit" onclick="exitPerformanceMode()">&#9998; Edit</button>
  </div>
  <div style="text-align:center;font-size:10px;color:var(--text3);padding:4px 0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;" id="perf-count"></div>
  <div class="perf-song-list" id="perf-song-list"></div>
  <div class="perf-footer">
    <button class="perf-nav-btn active" id="perf-nav-0" onclick="switchPerfSet(0)">Set 1</button>
    <button class="perf-nav-btn" id="perf-nav-1" onclick="switchPerfSet(1)">Set 2</button>
    <button class="perf-nav-btn" id="perf-nav-2" onclick="switchPerfSet(2)">Set 3</button>
  </div>
</div>

<div id="song-view" class="screen">
  <div class="sv-nav">
    <button class="sv-back" id="sv-back" onclick="closeSong()">Back</button>
    <span class="sv-pos" id="sv-pos"></span>
    <div class="sv-font">
      <button class="sv-fbtn" onclick="changeFont(-1)">A-</button>
      <button class="sv-fbtn" onclick="changeFont(1)">A+</button>
    </div>
    <div class="sv-nav-btns">
      <button class="sv-nbtn" onclick="G.perfMode?navSongPerf(-1):navSong(-1)">&#8249;</button>
      <button class="sv-nbtn" onclick="G.perfMode?navSongPerf(1):navSong(1)">&#8250;</button>
    </div>
  </div>
  <div class="sv-tabs">
    <div class="sv-tab active" data-tab="chart" onclick="switchTab('chart')">Chart</div>
    <div class="sv-tab" data-tab="orig" onclick="switchTab('orig')">Original</div>
    <div class="sv-tab" data-tab="lyrics" onclick="switchTab('lyrics')">Lyrics</div>
  </div>
  <div class="sv-content" id="sv-content"></div>
</div>

<div id="replace-view" class="screen">
  <div class="rp-nav">
    <button class="rp-back" onclick="closeReplace()">Cancel</button>
    <span class="rp-title-h">Replace Song</span>
    <span style="min-width:60px"></span>
  </div>
  <div class="rp-hint">Replacing: <strong id="rp-replacing"></strong> &mdash; Same key highlighted</div>
  <div class="rp-search"><input type="search" placeholder="Search all 101 songs..." id="rp-search" oninput="filterReplace(this.value)"></div>
  <div class="rp-list" id="rp-list"></div>
</div>

<div id="confirm-overlay" class="overlay">
  <div class="modal-sheet">
    <h3 id="confirm-title"></h3>
    <p id="confirm-msg"></p>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('confirm-overlay')">Cancel</button>
      <button class="mbtn danger" id="confirm-ok" onclick="runConfirm()">Confirm</button>
    </div>
  </div>
</div>

<div id="share-overlay" class="overlay">
  <div class="modal-sheet">
    <h3 id="share-title">Share Set List</h3>
    <pre id="share-preview" style="font-size:11px;overflow:auto;max-height:180px;background:var(--surface2);padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:12px;white-space:pre-wrap;word-break:break-word;"></pre>
    <div class="share-opts">
      <button class="share-opt" onclick="doShare('copy')">Copy to Clipboard</button>
      <button class="share-opt" onclick="doShare('sms')">Send via Messages</button>
      <button class="share-opt" onclick="doShare('email')">Send via Email</button>
    </div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal('share-overlay')">Done</button>
    </div>
  </div>
</div>

<div id="welcome-overlay" class="overlay">
  <div class="modal-sheet">
    <h3 style="font-family:'Playfair Display',serif;font-size:22px;margin-bottom:6px;">Welcome Back!</h3>
    <p style="font-size:13px;color:var(--text2);margin-bottom:4px;">You have a saved session:</p>
    <div id="welcome-summary" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin:10px 0 18px;font-size:14px;line-height:1.8;"></div>
    <div class="modal-btns">
      <button class="mbtn danger" onclick="welcomeNewNight()">New Night</button>
      <button class="mbtn primary" onclick="welcomeContinue()">Continue ›</button>
    </div>
  </div>
</div>

<div id="drag-ghost"></div>

<script>
const FONT_SIZES = [
  {sv:'12px',sa:'10px',sc:'11px',ro:'11px',ch:'13px',cc:'13px',lh:'11px',ll:'15px',ot:'11px',oc:'12px',ol:'11px'},
  {sv:'14px',sa:'11px',sc:'12px',ro:'12px',ch:'14px',cc:'14px',lh:'12px',ll:'16px',ot:'12px',oc:'13px',ol:'12px'},
  {sv:'16px',sa:'12px',sc:'14px',ro:'13px',ch:'15px',cc:'15px',lh:'13px',ll:'18px',ot:'13px',oc:'14px',ol:'13px'},
  {sv:'20px',sa:'14px',sc:'16px',ro:'14px',ch:'17px',cc:'17px',lh:'14px',ll:'21px',ot:'14px',oc:'16px',ol:'14px'},
  {sv:'24px',sa:'16px',sc:'18px',ro:'16px',ch:'20px',cc:'20px',lh:'16px',ll:'25px',ot:'16px',oc:'19px',ol:'16px'},
];

var pendingConfirm=null, shareSetIdx=-1, replaceSetIdx=-1, replacePos=-1;
var swipeOpen=null, libFilter='';
var dragSrc={type:null,si:-1,pos:-1,songIdx:-1};

function showMain(){
  document.getElementById('gh-band').value=G.bandName||'';
  document.getElementById('gh-event').value=G.event||'';
  document.getElementById('gh-date').value=G.date||'';
  buildCols();
  showScreen('main');
}

function buildCols(){
  var area=document.getElementById('cols-area');
  area.innerHTML='';
  for(var i=0;i<G.numSets;i++) area.appendChild(makeSetCol(i));
  area.appendChild(makeLibCol());
}

function makeSetCol(si){
  var set=G.sets[si];
  var col=document.createElement('div');
  col.className='set-col'; col.id='col-'+si;
  var n=set.songs.length, full=n>=MAX_SONGS;
  var pct=Math.min(100,n/MAX_SONGS*100);
  col.innerHTML=
    '<div class="set-h">'+
      '<div class="set-h-top">'+
        '<span class="set-label">Set '+(si+1)+'</span>'+
        '<div class="set-btns">'+
          '<button class="shbtn share" onclick="shareSet('+si+')">Share</button>'+
          '<button class="shbtn lock'+(set.locked?' on':'')+'" id="lock-'+si+'" onclick="toggleLock('+si+')">'+(set.locked?'Unlock':'Lock')+'</button>'+
          '<button class="shbtn clear" onclick="clearSet('+si+')">Clear</button>'+
        '</div>'+
      '</div>'+
      '<div class="prog-row">'+
        '<span class="prog-label'+(full?' full':'')+'" id="pl-'+si+'">'+(n===0?'empty':n+(n===1?' song':' songs'))+(full?' — FULL':'')+'</span>'+
        '<div class="prog-track"><div class="prog-fill'+(full?' full':'')+'" id="pf-'+si+'" style="width:'+pct+'%"></div></div>'+
      '</div>'+
    '</div>'+
    '<div class="set-songs" id="songs-'+si+'"></div>'+
    '<div class="drop-zone" id="dz-'+si+'"></div>';
  renderSetSongs(si, col.querySelector('#songs-'+si));
  var dz=col.querySelector('#dz-'+si);
  dz.addEventListener('dragover',function(e){ onDragOver(e,si,-1); });
  dz.addEventListener('drop',function(e){ onDrop(e,si,-1); });
  dz.addEventListener('dragleave',function(){ dz.classList.remove('active'); });
  return col;
}

function renderSetSongs(si,container){
  var set=G.sets[si];
  container.innerHTML='';
  set.songs.forEach(function(songIdx,pos){
    var s=SONGS[songIdx]; if(!s)return;
    var capo=s.capo&&s.capo!=='None'?' · Capo '+s.capo:'';
    var row=document.createElement('div');
    row.className='song-row';
    row.dataset.si=si; row.dataset.pos=pos; row.dataset.idx=songIdx;
    row.draggable=!set.locked;
    row.innerHTML=
      '<span class="row-num">'+(pos+1)+'</span>'+
      '<span class="row-handle"'+(set.locked?' style="opacity:0.2"':'')+'>&#8942;&#8942;</span>'+
      '<div class="row-info" onclick="openSong('+si+','+pos+')">'+
        '<div class="row-title">'+s.title+'</div>'+
        '<div class="row-meta">'+s.artist+' &middot; '+s.key+capo+'</div>'+
      '</div>'+
      '<div class="swipe-actions" id="sw-'+si+'-'+pos+'">'+
        '<button class="swipe-btn swipe-replace" onclick="startReplace('+si+','+pos+')">Replace</button>'+
        '<button class="swipe-btn swipe-remove" onclick="removeSong('+si+','+pos+')">Remove</button>'+
      '</div>';
    row.addEventListener('dragstart',function(e){ onDragStart(e,si,pos,songIdx); });
    row.addEventListener('dragend',onDragEnd);
    row.addEventListener('dragover',function(e){ onDragOver(e,si,pos); });
    row.addEventListener('drop',function(e){ onDrop(e,si,pos); });
    if(!set.locked) addSwipe(row,si,pos);
    if(!set.locked) initTouchDrag(row,si,pos,songIdx);
    container.appendChild(row);
  });
}

function refreshCol(si){
  var old=document.getElementById('col-'+si);
  if(old) old.replaceWith(makeSetCol(si));
  renderLib();
}

function makeLibCol(){
  var col=document.createElement('div');
  col.className='lib-col';
  col.innerHTML=
    '<div class="lib-h">'+
      '<div class="set-h-top">'+
        '<span class="set-label">&#9834; Library</span>'+
        '<span style="font-size:9px;color:var(--text3)">'+SONGS.length+' songs</span>'+
      '</div>'+
    '</div>'+
    '<div class="lib-search"><input class="lib-input" type="search" placeholder="Search..." id="lib-search" oninput="filterLib(this.value)"></div>'+
    '<div class="lib-list" id="lib-list"></div>';
  setTimeout(renderLib,0);
  return col;
}

function getAllInSets(){
  var s=new Set();
  G.sets.forEach(function(set){ set.songs.forEach(function(i){ s.add(i); }); });
  return s;
}

function renderLib(){
  var list=document.getElementById('lib-list'); if(!list)return;
  var inSets=getAllInSets();
  var q=libFilter.toLowerCase();
  function sortKey(title){ return title.toLowerCase().replace(/^(the |a |an )/,''); }
  var filtered=SONGS.map(function(s,i){ return {s:s,i:i}; }).filter(function(x){
    return !q||x.s.title.toLowerCase().indexOf(q)>=0||x.s.artist.toLowerCase().indexOf(q)>=0;
  }).sort(function(a,b){ var ka=sortKey(a.s.title),kb=sortKey(b.s.title); return ka<kb?-1:ka>kb?1:0; });
  list.innerHTML=filtered.map(function(x){
    var inSet=inSets.has(x.i);
    var capo=x.s.capo&&x.s.capo!=='None'?' &middot; Capo '+x.s.capo:'';
    return '<div class="lib-row'+(inSet?' in-set':'')+'"'+
      (!inSet?' draggable="true" ondragstart="onLibDragStart(event,'+x.i+')" ondragend="onDragEnd(event)"':'')+'>'+
      '<div class="lib-info">'+
        '<div class="lib-title">'+x.s.title+'</div>'+
        '<div class="lib-meta">'+x.s.artist+' &middot; '+x.s.key+capo+'</div>'+
      '</div>'+
      '<button class="lib-add'+(inSet?' in':'')+'"'+(inSet?'':' onclick="addToSet('+x.i+')"')+'>'+(inSet?'&#10003;':'+')+'</button>'+
    '</div>';
  }).join('');
}

function filterLib(q){ libFilter=q; renderLib(); }

function addToSet(songIdx){
  var available=[];
  for(var i=0;i<G.numSets;i++){
    if(G.sets[i].songs.length<MAX_SONGS&&!G.sets[i].locked) available.push(i);
  }
  if(available.length===0){ alert('All sets are full or locked'); return; }
  if(available.length===1){
    G.sets[available[0]].songs.push(songIdx);
    saveState(); refreshCol(available[0]); return;
  }
  // Show set picker
  var song=SONGS[songIdx];
  var overlay=document.getElementById('confirm-overlay');
  var titleEl=document.getElementById('confirm-title');
  var msgEl=document.getElementById('confirm-msg');
  var okBtn=document.getElementById('confirm-ok');
  titleEl.textContent='Add to which set?';
  var div=document.createElement('div');
  div.style.cssText='display:flex;flex-direction:column;gap:8px;margin-top:8px';
  available.forEach(function(si){
    var btn=document.createElement('button');
    btn.className='mbtn primary';
    var n=G.sets[si].songs.length;
    btn.textContent='Set '+(si+1)+' — '+(n===0?'empty':n+(n===1?' song':' songs'));
    btn.onclick=function(){
      overlay.classList.remove('active');
      okBtn.style.display='';
      G.sets[si].songs.push(songIdx);
      saveState(); refreshCol(si);
    };
    div.appendChild(btn);
  });
  var cancelBtn=document.createElement('button');
  cancelBtn.className='mbtn cancel';
  cancelBtn.textContent='Cancel';
  cancelBtn.style.marginTop='4px';
  cancelBtn.onclick=function(){ overlay.classList.remove('active'); okBtn.style.display=''; };
  div.appendChild(cancelBtn);
  msgEl.innerHTML='';
  msgEl.appendChild(div);
  okBtn.style.display='none';
  overlay.classList.add('active');
}

function removeSong(si,pos){
  if(G.sets[si].locked){ alert('Set is locked. Tap Unlock to edit.'); return; }
  G.sets[si].songs.splice(pos,1);
  saveState(); refreshCol(si);
}

function addSwipe(row,si,pos){
  var startX=0,startY=0,swiped=false;
  row.addEventListener('touchstart',function(e){ startX=e.touches[0].clientX; startY=e.touches[0].clientY; swiped=false; },{passive:true});
  row.addEventListener('touchmove',function(e){
    var dx=e.touches[0].clientX-startX;
    var dy=Math.abs(e.touches[0].clientY-startY);
    if(dy>20)return;
    if(dx<-35&&!swiped){ swiped=true; closeSwipe(); var sw=document.getElementById('sw-'+si+'-'+pos); if(sw){ sw.classList.add('open'); swipeOpen=sw; } }
    else if(dx>35){ closeSwipe(); }
  },{passive:true});
}

function closeSwipe(){ if(swipeOpen){ swipeOpen.classList.remove('open'); swipeOpen=null; } }
document.addEventListener('touchstart',function(e){ if(swipeOpen&&!swipeOpen.parentElement.contains(e.target)) closeSwipe(); },{passive:true});

function onDragStart(e,si,pos,songIdx){
  dragSrc={type:'set',si:si,pos:pos,songIdx:songIdx};
  e.dataTransfer.effectAllowed='move';
  var g=document.getElementById('drag-ghost');
  g.textContent=SONGS[songIdx].title; g.style.display='block';
  e.dataTransfer.setDragImage(g,0,0);
}
function onLibDragStart(e,songIdx){
  dragSrc={type:'lib',si:-1,pos:-1,songIdx:songIdx};
  e.dataTransfer.effectAllowed='copy';
  var g=document.getElementById('drag-ghost');
  g.textContent=SONGS[songIdx].title; g.style.display='block';
  e.dataTransfer.setDragImage(g,0,0);
}
function onDragEnd(){
  document.getElementById('drag-ghost').style.display='none';
  document.querySelectorAll('.drag-top,.drag-bot').forEach(function(r){ r.classList.remove('drag-top','drag-bot'); });
  document.querySelectorAll('.drop-zone').forEach(function(z){ z.classList.remove('active'); });
}
function onDragOver(e,si,pos){
  e.preventDefault();
  if(G.sets[si].locked)return;
  document.querySelectorAll('.drag-top,.drag-bot').forEach(function(r){ r.classList.remove('drag-top','drag-bot'); });
  document.querySelectorAll('.drop-zone').forEach(function(z){ z.classList.remove('active'); });
  if(pos===-1){
    var dz=document.getElementById('dz-'+si);
    if(dz) dz.classList.add('active');
  } else {
    var row=document.querySelector('[data-si="'+si+'"][data-pos="'+pos+'"]');
    if(row){
      var rect=row.getBoundingClientRect();
      row.classList.add(e.clientY<rect.top+rect.height/2?'drag-top':'drag-bot');
    }
  }
}
function onDrop(e,si,pos){
  e.preventDefault();
  if(G.sets[si].locked){ alert('Set is locked.'); return; }
  var insertPos=pos===-1?G.sets[si].songs.length:pos;
  var row=pos>=0?document.querySelector('[data-si="'+si+'"][data-pos="'+pos+'"]'):null;
  if(row){
    var rect=row.getBoundingClientRect();
    if(e.clientY>=rect.top+rect.height/2) insertPos=pos+1;
  }
  if(dragSrc.type==='lib'){
    if(G.sets[si].songs.length>=MAX_SONGS){ alert('Set '+(si+1)+' is full'); return; }
    G.sets[si].songs.splice(insertPos,0,dragSrc.songIdx);
    saveState(); refreshCol(si);
  } else if(dragSrc.type==='set'){
    var fromSi=dragSrc.si, fromPos=dragSrc.pos, songIdx=dragSrc.songIdx;
    if(fromSi===si){
      var arr=G.sets[si].songs;
      arr.splice(fromPos,1);
      arr.splice(insertPos>fromPos?insertPos-1:insertPos,0,songIdx);
    } else {
      if(G.sets[si].songs.length>=MAX_SONGS){ alert('Set '+(si+1)+' is full'); return; }
      G.sets[fromSi].songs.splice(fromPos,1);
      G.sets[si].songs.splice(insertPos,0,songIdx);
      refreshCol(fromSi);
    }
    saveState(); refreshCol(si);
  }
  onDragEnd();
}

function toggleLock(si){ G.sets[si].locked=!G.sets[si].locked; saveState(); refreshCol(si); }
function clearSet(si){
  showConfirm('Clear Set '+(si+1)+'?','Remove all '+G.sets[si].songs.length+' songs?',function(){
    G.sets[si].songs=[]; G.sets[si].locked=false; saveState(); refreshCol(si);
  },'Clear','danger');
}

function shareSet(si){
  shareSetIdx=si;
  var set=G.sets[si];
  var text=(G.bandName||'My Band');
  if(G.event) text+=' - '+G.event;
  if(G.date) text+=' ('+G.date+')';
  text+='\nSet '+(si+1)+' - '+set.songs.length+' songs\n'+Array(35).join('-')+'\n';
  set.songs.forEach(function(idx,i){
    var s=SONGS[idx];
    var capo=s.capo&&s.capo!=='None'?' [Capo '+s.capo+']':'';
    var num=i+1<10?'0'+(i+1):''+(i+1);
    text+=num+'. '+s.title+' - '+s.artist+' ('+s.key+capo+')\n';
  });
  document.getElementById('share-title').textContent='Share Set '+(si+1);
  document.getElementById('share-preview').textContent=text;
  document.getElementById('share-overlay').classList.add('active');
}
function doShare(method){
  var text=document.getElementById('share-preview').textContent;
  if(method==='copy'){
    navigator.clipboard.writeText(text).then(function(){ alert('Copied!'); });
  } else if(method==='sms'){
    window.location.href='sms:&body='+encodeURIComponent(text);
  } else if(method==='email'){
    window.location.href='mailto:?subject='+encodeURIComponent((G.bandName||'Song Book')+' Set '+(shareSetIdx+1))+'&body='+encodeURIComponent(text);
  }
}

function startReplace(si,pos){
  closeSwipe();
  replaceSetIdx=si; replacePos=pos;
  document.getElementById('rp-replacing').textContent=SONGS[G.sets[si].songs[pos]].title;
  document.getElementById('rp-search').value='';
  filterReplace('');
  showScreen('replace-view');
}
function filterReplace(q){
  var ql=q.toLowerCase();
  var cur=SONGS[G.sets[replaceSetIdx].songs[replacePos]];
  var filtered=SONGS.map(function(s,i){ return {s:s,i:i}; })
    .filter(function(x){ return x.i!==G.sets[replaceSetIdx].songs[replacePos]; })
    .filter(function(x){ return !ql||x.s.title.toLowerCase().indexOf(ql)>=0||x.s.artist.toLowerCase().indexOf(ql)>=0; });
  document.getElementById('rp-list').innerHTML=filtered.map(function(x){
    var sk=x.s.key===cur.key;
    var capo=x.s.capo&&x.s.capo!=='None'?' &middot; Capo '+x.s.capo:'';
    return '<div class="rp-row'+(sk?' same-key':'')+'" onclick="doReplace('+x.i+')">'+
      '<div class="rp-info">'+
        '<div class="rp-title-text">'+x.s.title+'</div>'+
        '<div class="rp-meta">'+x.s.artist+' &middot; '+x.s.key+capo+(sk?' (same key)':'')+'</div>'+
      '</div>'+
      '<span style="color:var(--text3);font-size:18px">&#8250;</span>'+
    '</div>';
  }).join('');
}
function doReplace(songIdx){
  G.sets[replaceSetIdx].songs[replacePos]=songIdx;
  saveState(); refreshCol(replaceSetIdx); showMain();
}
function closeReplace(){ showMain(); }

function openSong(si,pos){
  G.currentSet=si; G.currentPos=pos; G.activeTab='chart';
  renderSong(); showScreen('song-view');
}
function closeSong(){ if(G.perfMode){ G.perfMode=false; renderPerfView(); showScreen("perf-view"); } else { showMain(); } }
function navSong(dir){
  var np=G.currentPos+dir;
  if(np<0||np>=G.sets[G.currentSet].songs.length)return;
  G.currentPos=np; renderSong();
  document.getElementById('sv-content').scrollTop=0;
}
function navSongPerf(dir){
  var np=G.currentPos+dir;
  var set=G.sets[G.currentSet];
  if(np<0){
    // Go to previous set if available
    if(G.currentSet>0&&G.sets[G.currentSet-1].songs.length>0){
      G.currentSet--; perfSet=G.currentSet;
      G.currentPos=G.sets[G.currentSet].songs.length-1;
      renderSong(); document.getElementById('sv-content').scrollTop=0;
    }
  } else if(np>=set.songs.length){
    // Go to next set if available  
    if(G.currentSet<G.numSets-1&&G.sets[G.currentSet+1].songs.length>0){
      G.currentSet++; perfSet=G.currentSet;
      G.currentPos=0;
      renderSong(); document.getElementById('sv-content').scrollTop=0;
    }
  } else {
    G.currentPos=np; renderSong();
    document.getElementById('sv-content').scrollTop=0;
  }
}
function switchTab(tab){
  G.activeTab=tab;
  document.querySelectorAll('.sv-tab').forEach(function(t){ t.classList.toggle('active',t.dataset.tab===tab); });
  renderSongContent();
  document.getElementById('sv-content').scrollTop=0;
}
function changeFont(dir){
  G.fontSize=Math.max(0,Math.min(FONT_SIZES.length-1,G.fontSize+dir));
  saveState(); renderSongContent();
}
function renderSong(){
  document.getElementById('sv-back').textContent='Back to Set '+(G.currentSet+1);
  document.getElementById('sv-pos').textContent=(G.currentPos+1)+' of '+G.sets[G.currentSet].songs.length;
  document.querySelectorAll('.sv-tab').forEach(function(t){ t.classList.toggle('active',t.dataset.tab===G.activeTab); });
  renderSongContent();
}
function renderSongContent(){
  var songIdx=G.sets[G.currentSet].songs[G.currentPos];
  var s=SONGS[songIdx]; var f=FONT_SIZES[G.fontSize];
  var el=document.getElementById('sv-content');

  if(G.perfMode){
    // ── PERFORMANCE MODE — stacked layout ──
    var capo=s.capo&&s.capo!=='None'?'  ·  Capo '+s.capo:'';
    var perfHeader=
      '<div class="perf-song-header">'+
        '<div class="perf-song-title" style="font-size:'+f.sv+'">'+s.title+'</div>'+
        '<div class="perf-song-sub" style="font-size:'+f.sa+'">Key: '+s.key+capo+'</div>'+
      '</div>';

    if(G.activeTab==='chart'){
      var h=perfHeader;
      s.chart.forEach(function(item){
        if(item.type==='head'){
          h+='<div class="ps-head" style="font-size:'+f.ch+'">'+item.text+'</div>';
        } else {
          h+='<div class="ps-chords" style="font-size:'+f.cc+'">'+item.chords+'</div>';
          if(item.cue) h+='<div class="ps-cue" style="font-size:'+f.cc+'">'+item.cue+'</div>';
        }
      });
      el.innerHTML=h;

    } else if(G.activeTab==='orig'){
      var h=perfHeader;
      var allOrig=s.origLeft.concat(s.origRight);
      allOrig.forEach(function(item){
        if(item.type==='head') h+='<div class="ps-head" style="font-size:'+f.ch+'">'+item.text+'</div>';
        else if(item.type==='chord') h+='<div class="ps-chords" style="font-size:'+f.cc+'">'+item.text+'</div>';
        else h+='<div class="ps-cue" style="font-size:'+f.cc+'">'+item.text+'</div>';
      });
      el.innerHTML=h;

    } else {
      var h=perfHeader;
      s.lyrics.forEach(function(item){
        if(item.type==='head') h+='<div class="ps-head" style="font-size:'+f.lh+'">'+item.text+'</div>';
        else h+='<div class="l-line" style="font-size:'+f.ll+'">'+item.text+'</div>';
      });
      el.innerHTML=h;
    }
    return;
  }

  // ── STANDARD MODE — compact side by side ──
  var capoHtml=s.capo&&s.capo!=='None'?'<span class="chip capo">Capo <span>'+s.capo+'</span></span>':'';
  var header='<div class="sv-header">'+
    '<div class="sv-title" style="font-size:'+f.sv+'">'+s.title+'</div>'+
    '<div class="sv-artist" style="font-size:'+f.sa+'">'+s.artist+'</div>'+
    '<div class="sv-chips"><span class="chip" style="font-size:'+f.sc+'">Key: <span>'+s.key+'</span></span>'+capoHtml+'</div>'+
  '</div>'+(s.roadmap?'<div class="roadmap" style="font-size:'+f.ro+'">'+s.roadmap+'</div>':'');

  if(G.activeTab==='chart'){
    var h=header;
    s.chart.forEach(function(item){
      if(item.type==='head') h+='<div class="c-head" style="font-size:'+f.ch+'">'+item.text+'</div>';
      else h+='<div class="c-line"><span class="c-chords" style="font-size:'+f.cc+'">'+item.chords+'</span>'+(item.cue?'<span class="c-cue" style="font-size:'+f.cc+';color:#ddd">'+item.cue+'</span>':'')+'</div>';
    });
    el.innerHTML=h;
  } else if(G.activeTab==='orig'){
    var left='',right='';
    s.origLeft.forEach(function(item){
      if(item.type==='head') left+='<div class="o-head" style="font-size:'+f.ot+'">'+item.text+'</div>';
      else if(item.type==='chord') left+='<div class="o-chord" style="font-size:'+f.oc+'">'+item.text+'</div>';
      else left+='<div class="o-lyric" style="font-size:'+f.ol+';color:#ccc">'+item.text+'</div>';
    });
    s.origRight.forEach(function(item){
      if(item.type==='head') right+='<div class="o-head" style="font-size:'+f.ot+'">'+item.text+'</div>';
      else if(item.type==='chord') right+='<div class="o-chord" style="font-size:'+f.oc+'">'+item.text+'</div>';
      else right+='<div class="o-lyric" style="font-size:'+f.ol+';color:#ccc">'+item.text+'</div>';
    });
    el.innerHTML=header+'<div class="o-cols"><div>'+left+'</div><div>'+right+'</div></div>';
  } else {
    var h=header;
    s.lyrics.forEach(function(item){
      if(item.type==='head') h+='<div class="l-head" style="font-size:'+f.lh+'">'+item.text+'</div>';
      else h+='<div class="l-line" style="font-size:'+f.ll+'">'+item.text+'</div>';
    });
    el.innerHTML=h;
  }
}

function showConfirm(title,msg,fn,btnTxt,btnClass){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  var ok=document.getElementById('confirm-ok');
  ok.textContent=btnTxt||'Confirm';
  ok.className='mbtn '+(btnClass||'danger');
  pendingConfirm=fn;
  document.getElementById('confirm-overlay').classList.add('active');
}
function runConfirm(){ closeModal('confirm-overlay'); if(pendingConfirm){ pendingConfirm(); pendingConfirm=null; } }
function closeModal(id){ document.getElementById(id).classList.remove('active'); }

// INIT
loadState();
if(G.setupDone){
  // Show welcome back screen
  var wbTitle = document.getElementById('wb-title');
  var wbDetail = document.getElementById('wb-detail');
  var wbSets = document.getElementById('wb-sets');
  if(wbTitle){
    var titleText = G.bandName || 'Song Book';
    if(G.event) titleText += ' — ' + G.event;
    wbTitle.textContent = titleText;
    if(G.date) wbDetail.textContent = G.date + ' · Saved session restored';
    var setsHtml = '';
    for(var i=0;i<G.numSets;i++){
      var n=G.sets[i].songs.length;
      if(n>0){
        var preview=G.sets[i].songs.slice(0,3).map(function(idx){
          return SONGS[idx]?SONGS[idx].title:'';
        }).filter(Boolean).join(', ');
        if(G.sets[i].songs.length>3) preview += '...';
        setsHtml+='<div style="padding:8px 0;border-bottom:1px solid var(--border);last-child:border:none">';
        setsHtml+='<div style="font-weight:700;color:var(--accent);font-size:12px;letter-spacing:1px;text-transform:uppercase;">Set '+(i+1)+' — '+n+' songs</div>';
        setsHtml+='<div style="font-size:12px;color:var(--text2);margin-top:3px;">'+preview+'</div>';
        setsHtml+='</div>';
      }
    }
    if(wbSets) wbSets.innerHTML = setsHtml || '<div style="color:var(--text3);font-size:13px;text-align:center;">No songs added yet</div>';
  }
  showScreen('welcome-view');
} else {
  showScreen('setup');
  if(G.bandName) document.getElementById('s-band').value=G.bandName;
}

// ── TOUCH DRAG & DROP FOR IPAD ──────────────────────────────────────────
var touchDrag = {
  active: false,
  srcSi: -1,
  srcPos: -1,
  songIdx: -1,
  ghost: null,
  startY: 0,
  startX: 0,
  lastTarget: null
};

function initTouchDrag(row, si, pos, songIdx) {
  var handle = row.querySelector('.row-handle');
  if (!handle) return;

  handle.addEventListener('touchstart', function(e) {
    if (G.sets[si].locked) return;
    e.preventDefault();
    e.stopPropagation();
    var touch = e.touches[0];
    touchDrag.active = true;
    touchDrag.srcSi = si;
    touchDrag.srcPos = pos;
    touchDrag.songIdx = songIdx;
    touchDrag.startY = touch.clientY;
    touchDrag.startX = touch.clientX;

    // Create ghost
    var ghost = document.createElement('div');
    ghost.id = 'touch-ghost';
    ghost.style.cssText = 'position:fixed;z-index:999;background:var(--surface2);border:2px solid var(--accent);border-radius:8px;padding:8px 14px;font-family:Playfair Display,serif;font-size:13px;font-weight:700;color:var(--text);pointer-events:none;opacity:0.95;box-shadow:0 8px 24px rgba(0,0,0,0.6);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;';
    ghost.textContent = SONGS[songIdx].title;
    ghost.style.left = (touch.clientX - 20) + 'px';
    ghost.style.top = (touch.clientY - 20) + 'px';
    document.body.appendChild(ghost);
    touchDrag.ghost = ghost;

    // Dim source row
    row.style.opacity = '0.35';
  }, {passive: false});

  handle.addEventListener('touchmove', function(e) {
    if (!touchDrag.active) return;
    e.preventDefault();
    var touch = e.touches[0];

    // Move ghost
    if (touchDrag.ghost) {
      touchDrag.ghost.style.left = (touch.clientX - 20) + 'px';
      touchDrag.ghost.style.top = (touch.clientY - 20) + 'px';
    }

    // Find element under touch
    touchDrag.ghost.style.display = 'none';
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    touchDrag.ghost.style.display = '';

    // Clear all indicators
    document.querySelectorAll('.drag-top,.drag-bot').forEach(function(r) {
      r.classList.remove('drag-top', 'drag-bot');
    });
    document.querySelectorAll('.drop-zone').forEach(function(z) {
      z.classList.remove('active');
    });

    if (!el) return;

    // Find song row or drop zone
    var targetRow = el.closest('.song-row');
    var targetDz = el.closest('.drop-zone');
    var targetCol = el.closest('.set-col');

    if (targetRow) {
      var tSi = parseInt(targetRow.dataset.si);
      var tPos = parseInt(targetRow.dataset.pos);
      if (!G.sets[tSi].locked) {
        var rect = targetRow.getBoundingClientRect();
        if (touch.clientY < rect.top + rect.height / 2) {
          targetRow.classList.add('drag-top');
        } else {
          targetRow.classList.add('drag-bot');
        }
        touchDrag.lastTarget = {type: 'row', si: tSi, pos: tPos, clientY: touch.clientY, rect: rect};
      }
    } else if (targetDz) {
      var dzId = targetDz.id; // dz-0, dz-1, dz-2
      var tSi = parseInt(dzId.replace('dz-', ''));
      if (!G.sets[tSi].locked) {
        targetDz.classList.add('active');
        touchDrag.lastTarget = {type: 'dz', si: tSi};
      }
    } else if (targetCol) {
      // Dropped on col but not on a row — append to end
      var tSi = parseInt(targetCol.id.replace('col-', ''));
      if (!isNaN(tSi) && !G.sets[tSi].locked) {
        var dz = document.getElementById('dz-' + tSi);
        if (dz) dz.classList.add('active');
        touchDrag.lastTarget = {type: 'dz', si: tSi};
      }
    }
  }, {passive: false});

  handle.addEventListener('touchend', function(e) {
    if (!touchDrag.active) return;
    e.preventDefault();

    // Cleanup ghost
    if (touchDrag.ghost) {
      touchDrag.ghost.remove();
      touchDrag.ghost = null;
    }
    row.style.opacity = '';

    // Clear indicators
    document.querySelectorAll('.drag-top,.drag-bot').forEach(function(r) {
      r.classList.remove('drag-top', 'drag-bot');
    });
    document.querySelectorAll('.drop-zone').forEach(function(z) {
      z.classList.remove('active');
    });

    var target = touchDrag.lastTarget;
    var fromSi = touchDrag.srcSi;
    var fromPos = touchDrag.srcPos;
    var songIdx = touchDrag.songIdx;

    touchDrag.active = false;
    touchDrag.lastTarget = null;

    if (!target) return;

    if (target.type === 'row') {
      var tSi = target.si, tPos = target.pos;
      var insertPos = target.clientY < target.rect.top + target.rect.height / 2 ? tPos : tPos + 1;

      if (fromSi === tSi) {
        // Reorder within same set
        var arr = G.sets[tSi].songs;
        arr.splice(fromPos, 1);
        var np = insertPos > fromPos ? insertPos - 1 : insertPos;
        arr.splice(np, 0, songIdx);
      } else {
        // Move between sets
        if (G.sets[tSi].songs.length >= MAX_SONGS) {
          alert('Set ' + (tSi+1) + ' is full — max ' + MAX_SONGS + ' songs');
          return;
        }
        G.sets[fromSi].songs.splice(fromPos, 1);
        G.sets[tSi].songs.splice(insertPos, 0, songIdx);
        refreshCol(fromSi);
      }
      saveState(); refreshCol(tSi);

    } else if (target.type === 'dz') {
      var tSi = target.si;
      if (fromSi === tSi) {
        // Move to end of same set
        var arr = G.sets[tSi].songs;
        arr.splice(fromPos, 1);
        arr.push(songIdx);
      } else {
        if (G.sets[tSi].songs.length >= MAX_SONGS) {
          alert('Set ' + (tSi+1) + ' is full');
          return;
        }
        G.sets[fromSi].songs.splice(fromPos, 1);
        G.sets[tSi].songs.push(songIdx);
        refreshCol(fromSi);
      }
      saveState(); refreshCol(tSi);
    }
  }, {passive: false});

  handle.addEventListener('touchcancel', function() {
    if (touchDrag.ghost) { touchDrag.ghost.remove(); touchDrag.ghost = null; }
    row.style.opacity = '';
    touchDrag.active = false;
    touchDrag.lastTarget = null;
    document.querySelectorAll('.drag-top,.drag-bot').forEach(function(r) {
      r.classList.remove('drag-top', 'drag-bot');
    });
  }, {passive: true});
}

// ── PERFORMANCE MODE ────────────────────────────────────────────────────
var perfSet = 0;

function enterPerformanceMode() {
  perfSet = 0;
  // Find first set with songs
  for (var i = 0; i < G.numSets; i++) {
    if (G.sets[i].songs.length > 0) { perfSet = i; break; }
  }
  renderPerfView();
  showScreen('perf-view');
}

function exitPerformanceMode() {
  showMain();
}

function renderPerfView() {
  var set = G.sets[perfSet];
  
  // Header
  document.getElementById('perf-set-label').textContent = 'Set ' + (perfSet + 1);
  document.getElementById('perf-event').textContent = (G.bandName ? G.bandName + '  ·  ' : '') + (G.event || '') + (G.date ? '  ' + G.date : '');
  document.getElementById('perf-count').textContent = set.songs.length + ' songs';

  // Set nav buttons
  for (var i = 0; i < 3; i++) {
    var btn = document.getElementById('perf-nav-' + i);
    if (!btn) continue;
    if (i < G.numSets) {
      btn.style.display = '';
      btn.textContent = 'Set ' + (i + 1);
      btn.classList.toggle('active', i === perfSet);
      btn.classList.toggle('has-songs', G.sets[i].songs.length > 0);
    } else {
      btn.style.display = 'none';
    }
  }

  // Song list
  var list = document.getElementById('perf-song-list');
  list.innerHTML = '';
  if (set.songs.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px;font-size:16px">No songs in this set</div>';
    return;
  }
  set.songs.forEach(function(songIdx, pos) {
    var s = SONGS[songIdx];
    if (!s) return;
    var capo = s.capo && s.capo !== 'None' ? ' · Capo ' + s.capo : '';
    var row = document.createElement('div');
    row.className = 'perf-row';
    row.innerHTML =
      '<span class="perf-num">' + (pos + 1) + '</span>' +
      '<div class="perf-info">' +
        '<div class="perf-title">' + s.title + '</div>' +
        '<div class="perf-meta">' + s.artist + ' · ' + s.key + capo + '</div>' +
      '</div>' +
      '<span class="perf-arrow">›</span>';
    row.addEventListener('click', function() {
      G.currentSet = perfSet;
      G.currentPos = pos;
      G.activeTab = 'chart';
      G.perfMode = true;
      renderSong();
      showScreen('song-view');
    });
    list.appendChild(row);
  });
}

function switchPerfSet(si) {
  var oldSet = perfSet;
  perfSet = si;
  
  // Slide animation
  var list = document.getElementById('perf-song-list');
  var dir = si > oldSet ? 1 : -1;
  list.style.transition = 'none';
  list.style.transform = 'translateX(' + (dir * 100) + '%)';
  list.style.opacity = '0';
  
  renderPerfView();
  
  setTimeout(function() {
    list.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
    list.style.transform = 'translateX(0)';
    list.style.opacity = '1';
  }, 20);
}
